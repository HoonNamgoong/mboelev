<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mboelev - 제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header>
    <button id="theme-toggle">Switch to Dark Mode</button>
  </header>

  <main>
    <h1>Welcome to Mboelev</h1>
    
    <section id="contact-section">
      <div class="contact-container">
        <h2>제휴 문의</h2>
        <p>협력 제안이나 문의사항이 있으시면 아래 양식을 작성해 주세요.</p>
        
        <form action="https://formspree.io/f/xqenyakl" method="POST">
          <div class="form-group">
            <label for="name">이름 / 회사명</label>
            <input type="text" id="name" name="name" required placeholder="성함 또는 회사명을 입력해 주세요">
          </div>
          
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
          </div>
          
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" required placeholder="문의 내용을 상세히 적어주세요" rows="5"></textarea>
          </div>
          
          <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
      </div>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
